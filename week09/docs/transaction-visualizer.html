    <script>
class ShardNode {
  constructor(nodeId, container) {
      this.nodeId = nodeId;
      this.container = container;
      this.latency = 600; // Default

      this.SHARD_LOCK = false;
      this.memory_state = { "inventory": {} };
      this.disk_state = null;

      // Register this node in the global directory
      NODE_REGISTRY[this.nodeId] = this;

      this.bindEvents();
      this.render();
  }

  bindEvents() {
    const q = (sel) => this.container.querySelector(sel);
    // q('.btn-init').onclick = () => this.initItem();
    q('.btn-reserve').onclick = () => this.reserveItem();
    q('.btn-release').onclick = () => this.releaseReservation();
    q('.btn-crash').onclick = () => this.simulateCrash();
    q('.btn-recover').onclick = () => this.recoverFromDisk();
    q('.btn-despawn').onclick = () => this.despawn();

    // Inside bindEvents()
    q('.btn-create-item').onclick = () => this.createItem();
    q('.btn-remove-item').onclick = () => this.removeItem();
    q('.btn-add-supply').onclick = () => this.adjustSupply(parseInt(this.getElement('inp-admin-qty').value));
    q('.btn-sub-supply').onclick = () => this.adjustSupply(-parseInt(this.getElement('inp-admin-qty').value));

    q('.inp-latency').oninput = (e) => { this.latency = parseInt(e.target.value); q('.lbl-latency').innerText = e.target.value + 'ms'; };

    // Update Title
    q('.node-title').innerText = `Shard Node [ID: ${this.nodeId}]`;

    this.getElement('inp-reserve-item-id').oninput = () => this.render();
    this.getElement('inp-item-id').oninput = () => this.render(); // Also for the Admin section
  }

  // --- 3. DOM SCOPING HELPER ---
  // Replaces document.getElementById
  getElement(className) {
    return this.container.querySelector(`.${className}`);
  }

  log(msg, color = "#00ff00") {
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.style.color = color;
    entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
    this.getElement('event-log').prepend(entry);
  }

  // --- 4. CONTEXT BINDING (Methods) ---
  async acquireLock() {
    this.SHARD_LOCK = true;
    this.render();
    await new Promise(r => setTimeout(r, this.latency));
  }

  async releaseLock() {
    this.SHARD_LOCK = false;
    this.render();
    await new Promise(r => setTimeout(r, this.latency));
  }

  async reserveItem() {
    // Pull Target Item and Reservation details
    const target_id = this.getElement('inp-reserve-item-id').value;
    const res_id = this.getElement('inp-res-id').value;
    const req_qty = parseInt(this.getElement('inp-qty').value);

    await this.acquireLock();
    this.log(`TX START: ReserveItem(on=${target_id}, res=${res_id}, qty=${req_qty})`, "#ffff00");

    const item = this.memory_state.inventory[target_id];

    // Guard 1: Existence
    if (!item) {
      this.log(`ABORT: Item ${target_id} not found`, "#ff0000");
      this.releaseLock(); return;
    }

    // Guard 2: Idempotency
    if (item.reservations[res_id]) {
      this.log(`IDEMPOTENCY: ${res_id} already exists on ${target_id}.`);
      this.releaseLock(); return;
    }

    // Guard 3: Safety Invariant
    const current_reserved = Object.values(item.reservations).reduce((a, b) => a + b, 0);
    const available = item.total_quantity - current_reserved;

    if (req_qty > available) {
      this.log(`ABORT: Insufficient Inventory on ${target_id}. Req: ${req_qty}, Avail: ${available}`, "#ff0000");
      this.releaseLock(); return;
    }

    // Mutation
    this.log(`RESERVING ${req_qty} on ${target_id}...`);
    item.reservations[res_id] = req_qty;
    this.render();
    await new Promise(r => setTimeout(r, this.latency));

    this.disk_state = JSON.stringify(this.memory_state);
    GLOBAL_DISK[this.nodeId] = this.disk_state; // Persist to "Physical" storage

    this.log("COMMIT SUCCESSFUL", "#00ff00");
    this.releaseLock();
  }

  async releaseReservation() {
    const target_id = this.getElement('inp-reserve-item-id').value;
    const res_id = this.getElement('inp-res-id').value;
    await this.acquireLock();
    this.log(`TX START: ReleaseReservation(id=${res_id})`, "#ffff00");

    const item = this.memory_state.inventory[target_id];

    // Guard 1: Existence
    if (!item) {
      this.log(`ABORT: Item ${target_id} not found`, "#ff0000");
      this.releaseLock(); return;
    }

    if (item && item.reservations[res_id]) {
      delete item.reservations[res_id];
      this.log("UPDATING MEMORY...");
      this.render();
      await new Promise(r => setTimeout(r, this.latency));

      this.disk_state = JSON.stringify(this.memory_state);
      GLOBAL_DISK[this.nodeId] = this.disk_state; // Persist to "Physical" storage
      this.log("RELEASE SUCCESSFUL");
    } else {
      this.log("ERROR: Reservation not found", "#ff0000");
    }
    this.releaseLock();
  }

  simulateCrash() {
    this.log("!!! CRASH DETECTED !!!", "#ff0000");
    this.memory_state = { "inventory": {} };
    this.SHARD_LOCK = false;
    this.getElement('node-status').innerText = "MEMORY_LOST / UNINITIALIZED";
    this.getElement('node-status').style.color = "#ff0000";
    this.log("Volatile memory wiped. Disk state persists.", "#ff8800");
    this.render();
  }

  async recoverFromDisk() {
    this.log("INITIATING RECOVERY FLOW...", "#00ccff");

    // Check global storage for this ID
    const persistentData = GLOBAL_DISK[this.nodeId];

    if (!persistentData) {
      this.log("RECOVERY ABORTED: No partition found for this ID.", "#ff8800");
      this.memory_state = { "inventory": {} };
    } else {
      this.log(`Mounting volume for Shard ${this.nodeId}...`);
      await new Promise(r => setTimeout(r, this.latency));

      this.memory_state = JSON.parse(persistentData);
      this.disk_state = persistentData;
      this.log("RECOVERY COMPLETE.", "#00ff00");
    }

    this.getElement('node-status').innerText = "OPERATIONAL";
    this.getElement('node-status').style.color = "#00ff00";
    await this.render();
  }

  // --- 5. LOCALIZED RENDER ---
  render() {
    const lockIndicator = this.getElement('shard-lock-indicator');
    lockIndicator.className = `shard-lock-indicator ${this.SHARD_LOCK ? 'locked' : 'unlocked'}`;
    lockIndicator.innerText = this.SHARD_LOCK ? 'SHARD_LOCK: ACQUIRED' : 'SHARD_LOCK: RELEASED';

    const isCrashed = this.getElement('node-status').innerText.includes("LOST");

    // Scoped querySelectorAll avoids affecting other nodes
    this.container.querySelectorAll('button:not(.btn-recover):not(.btn-crash):not(.btn-despawn), input')
      .forEach(el => el.disabled = this.SHARD_LOCK || isCrashed);

    this.getElement('mem-state-view').innerText = JSON.stringify(this.memory_state, null, 2);
    this.getElement('disk-state-view').innerText = this.disk_state ? this.disk_state : "(empty)";
    this.getElement('lock-val').innerText = this.SHARD_LOCK.toString();

    // Determine which item we are currently "looking at" in the UI
    const queryId = this.getElement('inp-reserve-item-id').value;
    this.getElement('query-id').innerText = queryId;

    const item = this.memory_state.inventory[queryId];

    if (item) {
      const reserved = Object.values(item.reservations).reduce((a, b) => a + b, 0);
      const avail = item.total_quantity - reserved;
      this.getElement('calc-available').innerText = avail.toString();
      this.getElement('calc-available').style.color = avail > 0 ? "#ff00ff" : "#ff0000";
    } else {
      this.getElement('calc-available').innerText = "NULL";
      this.getElement('calc-available').style.color = "#888";
    }

    // Ensure disk and memory views are updated
    this.getElement('mem-state-view').innerText = JSON.stringify(this.memory_state, null, 2);
    this.getElement('disk-state-view').innerText = this.disk_state ? this.disk_state : "(empty)";
    updateGlobalMonitor(); // yuck...
  }

  despawn() {
      delete NODE_REGISTRY[this.nodeId];
      this.container.remove();
      log(`Node ${this.nodeId} removed from registry.`);
  }

  async createItem() {
    const id = this.getElement('inp-item-id').value;
    const qty = parseInt(this.getElement('inp-admin-qty').value);
    await this.acquireLock();

    if (this.memory_state.inventory[id]) {
      this.log(`ABORT: Item ${id} already exists (Idempotent)`);
    } else {
      this.memory_state.inventory[id] = { total_quantity: qty, reservations: {} };

      this.disk_state = JSON.stringify(this.memory_state);
      GLOBAL_DISK[this.nodeId] = this.disk_state; // Persist to "Physical" storage
      this.log(`CREATED: ${id} with ${qty} units`);
    }
    this.releaseLock();
  }

  async removeItem() {
    const id = this.getElement('inp-item-id').value;
    await this.acquireLock();

    const item = this.memory_state.inventory[id];
    if (item && Object.keys(item.reservations).length > 0) {
      this.log(`ABORT: Cannot remove ${id} with active reservations`, "#ff0000");
    } else {
      delete this.memory_state.inventory[id];

      this.disk_state = JSON.stringify(this.memory_state);
      GLOBAL_DISK[this.nodeId] = this.disk_state; // Persist to "Physical" storage
      this.log(`REMOVED: ${id}`);
    }
    this.releaseLock();
  }

  async adjustSupply(amount) {
    const id = this.getElement('inp-item-id').value;
    await this.acquireLock();

    const item = this.memory_state.inventory[id];
    if (!item) {
      this.log(`ERROR: Item ${id} not found`, "#ff0000");
    } else {
      const new_total = item.total_quantity + amount;
      const current_reserved = Object.values(item.reservations).reduce((a, b) => a + b, 0);

      // INVARIANT GUARD: Capacity cannot drop below existing commitments
      if (new_total < current_reserved) {
        this.log(`ABORT: New total (${new_total}) < Reserved (${current_reserved})`, "#ff0000");
      } else if (new_total < 0) {
        this.log(`ABORT: Supply cannot be negative`, "#ff0000");
      } else {
        item.total_quantity = new_total;
        this.disk_state = JSON.stringify(this.memory_state);
        this.log(`SUPPLY ADJUSTED: ${id} total is now ${new_total}`);
      }
    }
    this.releaseLock();
  }



}

// --- GLOBAL COORDINATOR ---
let nodeCount = 0;
const spawnNode = () => {
  nodeCount++;
  const template = document.getElementById('shard-node-template');
  const clone = document.importNode(template.content, true);

  const container = document.createElement('div');
  container.appendChild(clone);
  document.getElementById('node-container').appendChild(container);

  new ShardNode(nodeCount, container);

  // Call this here instead of trying to wrap the function later
  updateShardMap();
};


// The "Network Directory" - Gateway uses this to find shards
const NODE_REGISTRY = {};

// The "Storage Area Network" - Simulates physical disk partitions
const GLOBAL_DISK = {};

// Helper for the Gateway's sharding logic
const getShardForItem = (itemId) => {
    // Simple hash: Sum of char codes % number of active nodes
    const nodeIds = Object.keys(NODE_REGISTRY);
    if (nodeIds.length === 0) return null;
    const hash = itemId.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
    return nodeIds[hash % nodeIds.length];
};

/**
 * Update the visual Shard Map.
 * Shows where the current Item ID *would* go based on active nodes.
 */
function updateShardMap() {
    const itemId = document.getElementById('gt-item-id').value;
    const mapBox = document.getElementById('map-entries');
    const nodeIds = Object.keys(NODE_REGISTRY);

    if (nodeIds.length === 0) {
        mapBox.innerHTML = "<span style='color:red;'>No Shards Online</span>";
        return;
    }

    const targetId = getShardForItem(itemId);

    mapBox.innerHTML = nodeIds.map(id => {
        const isTarget = id == targetId ? "▶ <span style='color:#00ff00; font-weight:bold;'>" : "  <span style='color:#555;'>";
        return `${isTarget}Shard ${id} ${id == targetId ? "[TARGET]" : ""}</span>`;
    }).join('<br>');
}

/**
 * Route Request with Liveness Check
 */
async function routeRequest() {
    const itemId = document.getElementById('gt-item-id').value;
    const qty = parseInt(document.getElementById('gt-qty').value);
    const status = document.getElementById('gt-status');

    const targetId = getShardForItem(itemId);
    const node = NODE_REGISTRY[targetId];

    // 1. Check if Shard exists
    if (!node) {
        status.innerText = `ROUTING ERROR: Shard ${targetId} is not in the registry.`;
        status.style.color = "#ff5555";
        return;
    }

    // 2. Check if Shard is "Alive" (Not Crashed)
    const nodeStatus = node.getElement('node-status').innerText;
    if (nodeStatus.includes("LOST")) {
        status.innerText = `RPC FAILURE: Shard ${targetId} is currently UNRESPONSIVE (Crashed).`;
        status.style.color = "#ff5555";
        return;
    }

    status.innerText = `SUCCESS: Item ${itemId} routed to Shard ${targetId}. Request acknowledged.`;
    status.style.color = "#00ff00";

    // Fill the node's local fields to visualize the RPC call
    node.getElement('inp-reserve-item-id').value = itemId;
    node.getElement('inp-res-id').value = "RPC-" + Math.floor(Math.random()*1000);
    node.getElement('inp-qty').value = qty;

    // Trigger the mutation logic
    node.reserveItem();
}

async function routeRequest(type) {
    const itemId = document.getElementById('gt-item-id').value;
    const resId = document.getElementById('gt-res-id').value;
    const qty = parseInt(document.getElementById('gt-qty').value);
    const status = document.getElementById('gt-status');

    const targetId = getShardForItem(itemId);
    const node = NODE_REGISTRY[targetId];

    if (!node || node.getElement('node-status').innerText.includes("LOST")) {
        status.innerText = "RPC FAILED: Shard unavailable.";
        status.style.color = "red";
        return;
    }

    // Inject data into the node's UI for visual confirmation
    node.getElement('inp-reserve-item-id').value = itemId;
    node.getElement('inp-res-id').value = resId;
    node.getElement('inp-qty').value = qty;

    // Route the specific method
    if (type === 'reserve') {
        node.reserveItem();
        status.innerText = `RESERVE -> Shard ${targetId}`;
    } else {
        node.releaseReservation();
        status.innerText = `RELEASE -> Shard ${targetId}`;
    }
    status.style.color = "#00ff00";
}

function updateGlobalMonitor() {
    const monitor = document.getElementById('monitor-content');
    let html = "";

    for (const [id, node] of Object.entries(NODE_REGISTRY)) {
        const diskData = GLOBAL_DISK[id] ? JSON.parse(GLOBAL_DISK[id]) : null;

        html += `<div style="margin-bottom: 10px; border-left: 2px solid #555; padding-left: 10px;">
                    <strong>Shard ${id}</strong>`;

        if (!diskData || Object.keys(diskData.inventory).length === 0) {
            html += `<div style="color: #666;">(No Committed Data)</div>`;
        } else {
            for (const [item, data] of Object.entries(diskData.inventory)) {
                const resCount = Object.keys(data.reservations).length;
                html += `<div style="color: #aaa;">
                           • ${item}: ${data.total_quantity} units
                           <span style="color: #ff8800;">(${resCount} res)</span>
                         </div>`;
            }
        }
        html += `</div>`;
    }
    monitor.innerHTML = html || "Waiting for shards...";
}


    </script>

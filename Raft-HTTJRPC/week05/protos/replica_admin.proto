syntax = "proto3";
package replica;

service ReplicaAdmin {
  rpc Status(StatusRequest) returns (StatusResponse);
}

message StatusRequest {}

enum Role {
  FOLLOWER = 0;
  CANDIDATE = 1;
  LEADER = 2;
}

message StatusResponse {
  int32 id = 1;
  Role role = 2;
  uint64 term = 3;
  string leader_hint = 4; // host:port or empty
  int64 last_log_index = 5;
  uint64 last_log_term = 6;
  int64 commit_index = 7;
}

syntax = "proto3";
package raft;

service RaftNode {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc SubmitCommand(SubmitCommandRequest) returns (SubmitCommandResponse);
  rpc GetCommittedMessages(GetCommittedMessagesRequest) returns (GetCommittedMessagesResponse);
}

message RequestVoteRequest {
  uint64 term = 1;            // candidate's current term
  int32 candidate_id = 2;     // candidate requesting the vote
  int64 last_log_index = 3;   // index of candidate's last log entry
  uint64 last_log_term = 4;   // term of candidate's last log entry
}

message RequestVoteResponse {
  uint64 term = 1;            // responder's current term (so candidate can step down if stale)
  bool vote_granted = 2;      
}

message LogEntry {
  uint64 term = 1;            
  bytes data = 2;             
}

message AppendEntriesRequest {
  uint64 term = 1;            // leader's current term
  int32 leader_id = 2;        // so followers know who the leader is
  int64 prev_log_index = 3;   // index of log entry right before the new ones
  uint64 prev_log_term = 4;   // term of that previous entry
  repeated LogEntry entries = 5;  // log entries to append (empty = heartbeat)
  int64 leader_commit = 6;    // leader's commit index
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
}

message SubmitCommandRequest {
  bytes data = 1;  // serialized message data
}

message SubmitCommandResponse {
  bool success = 1;
  uint64 log_index = 2;  // index where the entry was committed
  string leader_hint = 3;  // if not leader, tells gateway who is
}
message CommittedMessage {
  uint64 seq = 1;
  string user_a = 2;
  string user_b = 3;
  string from_user = 4;
  string text = 5;
  string client_id = 6;
  string client_msg_id = 7;
  int64 server_time_ms = 8;
}

message GetCommittedMessagesRequest {
  string user_a = 1;
  string user_b = 2;
  uint64 after_seq = 3;
  uint32 limit = 4;
}

message GetCommittedMessagesResponse {
  repeated CommittedMessage messages = 1;
}